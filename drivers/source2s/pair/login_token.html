<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px 20px 20px;
      color: #1a1a1a;
      background: #fff;
    }
    h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      border-color: #3a9d8f;
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      line-height: 1.5;
    }
    .error {
      color: #d9534f;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      padding: 8px 10px;
      background: #fff2f2;
      border-radius: 6px;
      border: 1px solid #f5c6c6;
    }
    .btn-connect {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #3a9d8f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-connect:hover { background: #2a8070; }
    .btn-connect:disabled { background: #9dcdc8; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>Connect to Plugchoice</h2>
  <p class="subtitle">Enter your Personal Access Token to discover your chargers.</p>

  <label for="token">Personal Access Token</label>
  <input type="password" id="token" autocomplete="off" spellcheck="false"
         placeholder="Paste your token here" />
  <p class="hint">
    Get your token at app.plugchoice.com &rarr; click your name bottom-left &rarr; Account Settings &rarr; API Tokens
  </p>
  <p class="error" id="error-msg"></p>

  <button class="btn-connect" id="btn-connect" onclick="connect()">Connect</button>

  <script>
    function onShowView() {
      document.getElementById('token').focus();
    }

    async function connect() {
      var token = document.getElementById('token').value.trim();
      var errorEl = document.getElementById('error-msg');
      var btn = document.getElementById('btn-connect');

      errorEl.style.display = 'none';

      if (!token) {
        errorEl.textContent = 'Please enter a Personal Access Token.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connecting\u2026';

      try {
        await Homey.emit('login', { username: token, password: '' });
        Homey.nextView();
      } catch (err) {
        errorEl.textContent = err.message || 'Invalid or expired token. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Connect';
      }
    }
  </script>
</body>
</html>
