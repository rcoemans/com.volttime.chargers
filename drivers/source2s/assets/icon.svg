<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Station body -->
  <rect x="28" y="10" width="36" height="68" rx="7" fill="#3a9d8f"/>
  <!-- Front panel / display -->
  <rect x="34" y="16" width="24" height="22" rx="4" fill="#d0f1ea"/>
  <!-- Lightning bolt on display -->
  <polygon points="50,18 44,28 49,28 43,38 51,27 46,27" fill="#3a9d8f"/>
  <!-- Charging port housing -->
  <rect x="36" y="46" width="20" height="14" rx="3" fill="#2a8070"/>
  <!-- Two pin holes in port -->
  <rect x="39" y="49" width="5" height="7" rx="1.5" fill="#d0f1ea"/>
  <rect x="48" y="49" width="5" height="7" rx="1.5" fill="#d0f1ea"/>
  <!-- Status LED strip -->
  <rect x="34" y="65" width="24" height="5" rx="2.5" fill="#2a8070"/>
  <rect x="36" y="66" width="6" height="3" rx="1.5" fill="#7ecdb8"/>
  <rect x="44" y="66" width="6" height="3" rx="1.5" fill="#7ecdb8"/>
  <rect x="52" y="66" width="4" height="3" rx="1.5" fill="#2a8070"/>
  <!-- Base -->
  <rect x="20" y="78" width="52" height="8" rx="5" fill="#2a8070"/>
  <!-- Charging cable -->
  <path d="M64 52 Q78 52 78 64" stroke="#2a8070" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Cable plug connector -->
  <rect x="74" y="63" width="8" height="12" rx="2" fill="#1e6b5e"/>
  <rect x="76" y="66" width="2" height="4" rx="1" fill="#3a9d8f"/>
  <rect x="80" y="66" width="2" height="4" rx="1" fill="#3a9d8f"/>
</svg>
